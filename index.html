<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Courses">
<meta name="theme-color" content="#111111">
<title>Courses à deux</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;color:#eee}
input:focus{outline:none;border-color:#4a7c59!important}
button{cursor:pointer;font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

.app{min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:100px;position:relative}

.header{position:sticky;top:0;z-index:10;background:rgba(17,17,17,.95);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);padding:12px 16px 8px}
.header-top{display:flex;justify-content:space-between;align-items:center}
.logo{font-size:20px;font-weight:700;letter-spacing:-.5px}
.icon-btn{background:none;border:none;color:#aaa;font-size:20px;padding:4px 8px;border-radius:8px}
.sync-bar{margin-top:4px;font-size:11px;color:#888}
.sync-bar.error{color:#e74c3c}

.search-wrap{padding:8px 16px 4px;position:sticky;top:56px;z-index:9;background:rgba(17,17,17,.95);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px)}
.search-box{position:relative}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
.search-input{width:100%;padding:8px 12px 8px 32px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.06);color:#eee;font-size:14px;font-family:inherit}

.settings{background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.06);padding:8px 16px}
.settings button{display:block;width:100%;background:none;border:none;color:#ccc;font-size:14px;padding:10px 0;text-align:left;border-bottom:1px solid rgba(255,255,255,.06)}
.settings button.danger{color:#e74c3c}

.group-head{display:flex;align-items:center;gap:8px;padding:10px 16px 6px;position:sticky;top:98px;background:rgba(17,17,17,.95);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);z-index:5;cursor:pointer;-webkit-user-select:none;user-select:none}
.group-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.group-label{font-size:13px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.5px;flex:1}
.group-count{font-size:11px;color:#666}
.group-chevron{font-size:12px;color:#555;margin-left:6px;transition:transform .2s}
.group-chevron.open{transform:rotate(180deg)}
.group-items{overflow:hidden;transition:max-height .25s ease}
.group-items.collapsed{max-height:0!important}

.item{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.04);animation:fadeIn .15s ease}
.item.done-item{opacity:.4}
.checkbox{background:none;border:none;padding:0;flex-shrink:0}
.box{width:22px;height:22px;border-radius:6px;border:2px solid rgba(255,255,255,.2)}
.box.done{border:none;background:#4a7c59;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.item-content{flex:1;display:flex;align-items:baseline;gap:8px;min-width:0}
.item-name{font-size:15px;font-weight:500}
.item-name.strike{text-decoration:line-through}
.item-qty{font-size:12px;color:#888;flex-shrink:0}
.del-btn{background:none;border:none;color:#555;font-size:14px;padding:4px 8px;flex-shrink:0}

.sep{padding:4px 16px 2px;display:flex;align-items:center;gap:8px}
.sep span{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.sep::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.06)}

.empty{text-align:center;padding:80px 20px}

.fab{position:fixed;bottom:28px;right:24px;width:56px;height:56px;border-radius:50%;background:#4a7c59;color:#fff;border:none;font-size:28px;font-weight:300;box-shadow:0 4px 24px rgba(74,124,89,.4);z-index:20;display:flex;align-items:center;justify-content:center}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#1a1a1a;border-radius:20px 20px 0 0;padding:20px 20px 32px;width:100%;max-width:480px;max-height:85vh;overflow:auto;animation:slideUp .25s ease}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:18px;font-weight:700}
.close-btn{background:none;border:none;color:#888;font-size:20px;padding:4px 8px}

.input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#eee;font-size:15px;margin-bottom:10px;font-family:inherit}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:12px 0 16px}
.cat-chip{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:#aaa;font-size:13px;text-align:left}
.cat-chip.active{border:none;color:#fff}
.cat-chip.add-new{border:1px dashed rgba(255,255,255,.2);justify-content:center;color:#888}
.primary-btn{width:100%;padding:14px;border-radius:12px;border:none;background:#4a7c59;color:#fff;font-size:16px;font-weight:600;margin-top:4px;font-family:inherit}
.primary-btn:disabled{opacity:.4}

.emoji-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.emoji-btn{font-size:24px;background:none;border:none;padding:4px 8px;border-radius:8px}
.emoji-btn.sel{background:rgba(255,255,255,.15)}
.color-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.color-btn{width:32px;height:32px;border-radius:50%;border:3px solid transparent}
.color-btn.sel{border-color:#fff}

.setup-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.setup-card{background:#1a1a1a;border-radius:20px;padding:28px;max-width:400px;width:100%;text-align:center}
.setup-title{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.setup-sub{color:#888;font-size:13px;margin-bottom:24px}
.setup-box{text-align:left;margin-bottom:16px;padding:12px;background:rgba(255,255,255,.03);border-radius:10px}
.setup-box h3{font-size:14px;font-weight:700;color:#4a7c59;margin-bottom:4px}
.setup-box p{font-size:13px;color:#aaa;line-height:1.5}
.setup-box code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:4px;font-size:13px}
.label{display:block;font-size:12px;color:#888;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.error-msg{color:#e74c3c;font-size:13px;margin-bottom:8px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const BASE_CAT=[
{id:"fruits-legumes",label:"Fruits & Légumes",emoji:"🥬",color:"#4a7c59"},
{id:"boucherie",label:"Boucherie & Poissonnerie",emoji:"🥩",color:"#c0392b"},
{id:"cremerie",label:"Crèmerie",emoji:"🧀",color:"#f0c040"},
{id:"epicerie",label:"Épicerie",emoji:"🫙",color:"#b5651d"},
{id:"boulangerie",label:"Boulangerie",emoji:"🥖",color:"#d4a056"},
{id:"surgeles",label:"Surgelés",emoji:"🧊",color:"#5dade2"},
{id:"boissons",label:"Boissons",emoji:"🍷",color:"#8e44ad"},
{id:"hygiene",label:"Hygiène & Beauté",emoji:"🧴",color:"#e8a0bf"},
{id:"maison",label:"Maison & Entretien",emoji:"🏠",color:"#2c7a7b"},
{id:"autre",label:"Autre",emoji:"📦",color:"#7f8c8d"}
];
const EMOJIS=["🐱","🐶","🍕","🎉","💊","🧹","🪴","🍼","🎮","🏋️","📚","🎁"];
const COLORS=["#e67e22","#e74c3c","#3498db","#2ecc71","#9b59b6","#1abc9c","#f39c12","#e84393"];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const $=s=>document.querySelector(s);
const esc=s=>s.replace(/</g,"&lt;").replace(/>/g,"&gt;");

let S={items:[],cc:[],token:localStorage.getItem("courses_token")||"",gistId:localStorage.getItem("courses_gist_id")||"",syncing:false,lastSync:null,error:"",showAdd:false,showSettings:false,showAddCat:false,search:"",_ac:"epicerie",_ce:EMOJIS[0],_ccl:COLORS[0],_cur:null,_open:{}};
let syncT=null;
function cats(){return[...BASE_CAT,...S.cc];}
function catById(id){return cats().find(c=>c.id===id)||{emoji:"📦",label:id,color:"#7f8c8d"};}

async function gLoad(){
  const r=await fetch(`https://api.github.com/gists/${S.gistId}`,{headers:{Authorization:`Bearer ${S.token}`,Accept:"application/vnd.github+json"}});
  if(!r.ok)throw new Error(`GitHub ${r.status}`);const g=await r.json();const c=g.files["courses.json"]?.content;
  return c?JSON.parse(c):{items:[],customCategories:[]};
}
async function gSave(d){
  const r=await fetch(`https://api.github.com/gists/${S.gistId}`,{method:"PATCH",headers:{Authorization:`Bearer ${S.token}`,Accept:"application/vnd.github+json","Content-Type":"application/json"},body:JSON.stringify({files:{"courses.json":{content:JSON.stringify(d,null,2)}}})});
  if(!r.ok)throw new Error(`GitHub ${r.status}`);
}
async function pull(){if(!S.token||!S.gistId)return;S.syncing=true;R();try{const d=await gLoad();S.items=d.items||[];S.cc=d.customCategories||[];S.lastSync=new Date();S.error="";}catch(e){S.error="Erreur synchro : "+e.message;}S.syncing=false;R();}
async function push(){if(!S.token||!S.gistId)return;S.syncing=true;R();try{await gSave({items:S.items,customCategories:S.cc,lastModified:new Date().toISOString()});S.lastSync=new Date();S.error="";}catch(e){S.error="Erreur sauvegarde : "+e.message;}S.syncing=false;R();}
function startSync(){pull();syncT=setInterval(pull,15000);}

function addItem(n,q,c){S.items.push({id:uid(),name:n,qty:q,category:c,checked:false,addedAt:new Date().toISOString()});push();R();}
function toggle(id){const i=S.items.find(x=>x.id===id);if(i)i.checked=!i.checked;push();R();}
function del(id){S.items=S.items.filter(x=>x.id!==id);push();R();}
function clearDone(){S.items=S.items.filter(x=>!x.checked);push();R();}
function addCat(l,e,c){const id=l.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]/g,"-");if(cats().find(x=>x.id===id))return id;S.cc.push({id,label:l,emoji:e,color:c});push();return id;}

function hl(t,q){if(!q)return esc(t);const lo=t.toLowerCase(),idx=lo.indexOf(q);if(idx===-1)return esc(t);return esc(t.slice(0,idx))+'<mark style="background:#4a7c59;color:#fff;border-radius:2px;padding:0 2px">'+esc(t.slice(idx,idx+q.length))+"</mark>"+esc(t.slice(idx+q.length));}

function R(){
  const a=$("#app"),ok=S.token&&S.gistId;
  a.innerHTML=ok?renderApp():renderSetup();
  bind(ok);
  const si=$("#inp-search");if(si&&S._cur!=null){si.setSelectionRange(S._cur,S._cur);}
}

function renderSetup(){
  return`<div class="setup-wrap"><div class="setup-card">
  <div style="font-size:48px;margin-bottom:8px">🛒</div>
  <h1 class="setup-title">Courses à deux</h1>
  <p class="setup-sub">Configuration unique — tu ne reverras plus cet écran</p>
  <div class="setup-box"><h3>1. Crée un Gist sur GitHub</h3><p>Va sur <strong>gist.github.com</strong>, crée un Gist avec un fichier nommé <code>courses.json</code> contenant <code>{}</code></p></div>
  <div class="setup-box"><h3>2. Génère un token GitHub</h3><p>Settings → Developer settings → Personal access tokens → Fine-grained → permission <strong>Gists: Read & Write</strong></p></div>
  <label class="label">Token GitHub</label><input class="input" type="password" id="inp-token" placeholder="github_pat_...">
  <label class="label">ID du Gist</label><input class="input" id="inp-gist" placeholder="bfcb022b24695a1541f0b481ca9c5023">
  <div id="setup-err"></div>
  <button class="primary-btn" id="btn-setup">C'est parti !</button>
  </div></div>`;
}

function renderApp(){
  const q=S.search.toLowerCase().trim();
  const fil=q?S.items.filter(i=>i.name.toLowerCase().includes(q)):S.items;
  const tU=S.items.filter(i=>!i.checked).length,tD=S.items.filter(i=>i.checked).length;

  const grouped=cats().map(c=>{
    const u=fil.filter(i=>!i.checked&&i.category===c.id);
    const d=fil.filter(i=>i.checked&&i.category===c.id);
    return{...c,u,d};
  }).filter(g=>g.u.length>0||g.d.length>0);

  const sync=S.error?`<span class="sync-bar error">${esc(S.error)}</span>`:`<span class="sync-bar">${S.syncing?"Synchro...":S.lastSync?"Synchro "+S.lastSync.toLocaleTimeString("fr-FR"):""} · ${tU} à prendre${tD>0?" · "+tD+" fait"+(tD>1?"s":""):""}</span>`;

  let set=S.showSettings?`<div class="settings"><button id="btn-clear">🗑 Vider les cochés (${tD})</button><button class="danger" id="btn-logout">↪ Déconnecter</button></div>`:"";

  let list="";
  if(!grouped.length&&!q)list=`<div class="empty"><div style="font-size:64px;margin-bottom:16px">🛒</div><p style="color:#888;font-size:15px">La liste est vide !</p><p style="color:#666;font-size:13px;margin-top:4px">Appuie sur + pour ajouter</p></div>`;
  else if(!grouped.length&&q)list=`<div class="empty"><p style="color:#888;font-size:15px">Aucun résultat pour «\u00a0${esc(q)}\u00a0»</p></div>`;
  else grouped.forEach(g=>{
    // Default: open if has unchecked items, closed if only checked
    if(S._open[g.id]===undefined)S._open[g.id]=g.u.length>0;
    const isOpen=S._open[g.id];
    list+=`<div class="group-head" data-grp="${g.id}"><span class="group-dot" style="background:${g.color}"></span><span class="group-label">${g.emoji} ${esc(g.label)}</span><span class="group-count">${g.u.length}/${g.u.length+g.d.length}</span><span class="group-chevron${isOpen?" open":""}">▼</span></div>`;
    list+=`<div class="group-items${isOpen?"":" collapsed"}">`;
    g.u.forEach(i=>{list+=renderItem(i,q,false);});
    if(g.d.length){
      list+=`<div class="sep"><span>fait${g.d.length>1?"s":""}</span></div>`;
      g.d.forEach(i=>{list+=renderItem(i,q,true);});
    }
    list+=`</div>`;
  });

  let addM=S.showAdd?renderAddModal():"";
  let catM=S.showAddCat?renderCatModal():"";

  return`<div class="app">
  <header class="header"><div class="header-top"><h1 class="logo">🛒 Courses</h1><div style="display:flex;gap:4px"><button class="icon-btn" id="btn-sync"><span style="display:inline-block;${S.syncing?"animation:spin 1s linear infinite":""}">⟳</span></button><button class="icon-btn" id="btn-settings">⚙</button></div></div><div>${sync}</div></header>
  <div class="search-wrap"><div class="search-box"><span class="search-icon">🔍</span><input class="search-input" id="inp-search" placeholder="Rechercher..." value="${esc(S.search)}"></div></div>
  ${set}<main style="padding:8px 0">${list}</main>
  <button class="fab" id="btn-fab">+</button>${addM}${catM}</div>`;
}

function renderItem(i,q,done){
  return`<div class="item${done?" done-item":""}"><button class="checkbox" data-t="${i.id}"><div class="box${done?" done":""}\">${done?"✓":""}</div></button><div class="item-content"><span class="item-name${done?" strike":""}">${hl(i.name,q)}</span>${i.qty?`<span class="item-qty">${esc(i.qty)}</span>`:""}</div><button class="del-btn" data-d="${i.id}">✕</button></div>`;
}

function renderAddModal(){
  const cs=cats();
  return`<div class="overlay" id="ov"><div class="modal">
  <div class="modal-head"><h2 class="modal-title">Ajouter un article</h2><button class="close-btn" id="btn-cm">✕</button></div>
  <input class="input" id="inp-name" placeholder="Ex: Tomates, Lait...">
  <input class="input" id="inp-qty" placeholder="Quantité (optionnel) : 500g, x3...">
  <div class="cat-grid">${cs.map(c=>`<button class="cat-chip${S._ac===c.id?" active":""}" data-cat="${c.id}" style="${S._ac===c.id?`background:${c.color};color:#fff;border:none`:""}">${c.emoji} <span style="font-size:12px">${esc(c.label)}</span></button>`).join("")}<button class="cat-chip add-new" id="btn-nc">＋ Catégorie</button></div>
  <button class="primary-btn" id="btn-ai">Ajouter</button>
  </div></div>`;
}

function renderCatModal(){
  return`<div class="overlay" id="ov2"><div class="modal">
  <div class="modal-head"><h2 class="modal-title">Nouvelle catégorie</h2><button class="close-btn" id="btn-cc">✕</button></div>
  <input class="input" id="inp-cn" placeholder="Nom de la catégorie">
  <label class="label">Emoji</label>
  <div class="emoji-grid">${EMOJIS.map(e=>`<button class="emoji-btn${S._ce===e?" sel":""}" data-e="${e}">${e}</button>`).join("")}</div>
  <label class="label">Couleur</label>
  <div class="color-grid">${COLORS.map(c=>`<button class="color-btn${S._ccl===c?" sel":""}" data-cl="${c}" style="background:${c}"></button>`).join("")}</div>
  <button class="primary-btn" id="btn-sc">Créer la catégorie</button>
  </div></div>`;
}

function bind(ok){
  if(!ok){
    $("#btn-setup")?.addEventListener("click",async()=>{
      const t=$("#inp-token").value.trim(),g=$("#inp-gist").value.trim();
      if(!t||!g)return;S.token=t;S.gistId=g;
      try{await gLoad();localStorage.setItem("courses_token",t);localStorage.setItem("courses_gist_id",g);startSync();R();}
      catch(e){$("#setup-err").innerHTML=`<p class="error-msg">Impossible de se connecter. Vérifie ton token et l'ID du Gist.</p>`;S.token="";S.gistId="";}
    });return;
  }
  $("#inp-search")?.addEventListener("input",e=>{S.search=e.target.value;S._cur=e.target.selectionStart;R();$("#inp-search")?.focus();});
  $("#btn-sync")?.addEventListener("click",pull);
  $("#btn-settings")?.addEventListener("click",()=>{S.showSettings=!S.showSettings;R();});
  $("#btn-clear")?.addEventListener("click",clearDone);
  $("#btn-logout")?.addEventListener("click",()=>{clearInterval(syncT);localStorage.removeItem("courses_token");localStorage.removeItem("courses_gist_id");S.token="";S.gistId="";S.items=[];S.cc=[];S.showSettings=false;R();});
  $("#btn-fab")?.addEventListener("click",()=>{S.showAdd=true;S._ac="epicerie";R();setTimeout(()=>$("#inp-name")?.focus(),100);});

  // Add modal
  $("#ov")?.addEventListener("click",e=>{if(e.target.id==="ov"){S.showAdd=false;R();}});
  $("#btn-cm")?.addEventListener("click",()=>{S.showAdd=false;R();});
  document.querySelectorAll("[data-cat]").forEach(b=>b.addEventListener("click",()=>{S._ac=b.dataset.cat;R();setTimeout(()=>$("#inp-name")?.focus(),50);}));
  $("#btn-ai")?.addEventListener("click",()=>{const n=$("#inp-name")?.value.trim(),q=$("#inp-qty")?.value.trim();if(!n)return;addItem(n,q,S._ac||"epicerie");if($("#inp-name")){$("#inp-name").value="";$("#inp-qty").value="";$("#inp-name").focus();}});
  $("#inp-name")?.addEventListener("keydown",e=>{if(e.key==="Enter")$("#btn-ai")?.click();});
  $("#inp-qty")?.addEventListener("keydown",e=>{if(e.key==="Enter")$("#btn-ai")?.click();});

  // New category
  $("#btn-nc")?.addEventListener("click",()=>{S.showAdd=false;S.showAddCat=true;S._ce=EMOJIS[0];S._ccl=COLORS[0];R();});
  $("#ov2")?.addEventListener("click",e=>{if(e.target.id==="ov2"){S.showAddCat=false;R();}});
  $("#btn-cc")?.addEventListener("click",()=>{S.showAddCat=false;R();});
  document.querySelectorAll("[data-e]").forEach(b=>b.addEventListener("click",()=>{S._ce=b.dataset.e;R();}));
  document.querySelectorAll("[data-cl]").forEach(b=>b.addEventListener("click",()=>{S._ccl=b.dataset.cl;R();}));
  $("#btn-sc")?.addEventListener("click",()=>{const n=$("#inp-cn")?.value.trim();if(!n)return;const id=addCat(n,S._ce,S._ccl);S.showAddCat=false;S.showAdd=true;S._ac=id;R();});

  // Accordion
  document.querySelectorAll("[data-grp]").forEach(b=>b.addEventListener("click",()=>{S._open[b.dataset.grp]=!S._open[b.dataset.grp];R();}));

  // Items
  document.querySelectorAll("[data-t]").forEach(b=>b.addEventListener("click",()=>toggle(b.dataset.t)));
  document.querySelectorAll("[data-d]").forEach(b=>b.addEventListener("click",()=>del(b.dataset.d)));
}

R();
if(S.token&&S.gistId)startSync();
</script>
</body>
</html>
